  // Bring older saved state up to the current schema (per-entity currency codes + rates).
  function migrate() {
    if (!state) return;
    if (!state.displayCurrency) {
      state.displayCurrency = (state.currency && SYMBOL_TO_CODE[state.currency]) || "USD";
      delete state.currency;
    }
    if (!state.lastCurrency) state.lastCurrency = state.displayCurrency;
    if (!("rates" in state)) state.rates = null;
    const dc = state.displayCurrency;
    if (!Array.isArray(state.pools)) state.pools = [];
    state.pools.forEach(p => { if (!p.cur) p.cur = dc; });
    if (!Array.isArray(state.goals)) state.goals = [];
    state.goals.forEach(g => { if (!g.cur) g.cur = dc; });
    if (state.investment && !state.investment.cur) state.investment.cur = dc;
    if (state.investment && Array.isArray(state.investment.surpluses)) state.investment.surpluses.forEach(s => { if (!s.cur) s.cur = dc; });
    if (!Array.isArray(state.todayExpenses)) state.todayExpenses = [];
    state.todayExpenses.forEach(e => { if (!e.cur) e.cur = dc; });
    if (Array.isArray(state.history)) state.history.forEach(h => { if (!h.cur) h.cur = dc; });
    if (typeof state.todaySpent === "number") delete state.todaySpent;
    if (Array.isArray(state.deficitDebits) && !Array.isArray(state.spendDebits)) state.spendDebits = state.deficitDebits;
    if ("deficitDebits" in state) delete state.deficitDebits;
    if (!Array.isArray(state.spendDebits)) state.spendDebits = [];
    if (typeof state.todayAllowance !== "number") state.todayAllowance = 0;
    if (typeof state.updatedAt !== "number") state.updatedAt = Date.now();
    if (!state.google || typeof state.google !== "object") state.google = { signedIn: false, fileId: null };
    // goal ratios (from the priority rework)
    if (state.goals.length) {
      if (state.goals.some(g => typeof g.ratio !== "number")) {
        const e = 100 / state.goals.length;
        state.goals.forEach(g => g.ratio = e);
      } else {
        distributeRatioAmong(state.goals, 100);
      }
      state.goals.forEach(g => { delete g.splitOverride; });
    }
    if (typeof state.goalSplit !== "number") state.goalSplit = 50;
    if (typeof state.seq !== "number") state.seq = 0;
  }

  // ============================================================ GOOGLE DRIVE SYNC
  const DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata";
  const SYNC_FILE = "budget-state.json";
  function clientId() { return (state && state.googleClientId) || GOOGLE_CLIENT_ID || ""; }
  function gisReady() { return !!(window.google && google.accounts && google.accounts.oauth2); }
  function signedIn() { return !!(state && state.google && state.google.signedIn); }
  function whenGisReady(cb) {
    if (gisReady()) return cb();
    let n = 0; const iv = setInterval(() => { if (gisReady()) { clearInterval(iv); cb(); } else if (++n > 40) clearInterval(iv); }, 500);
  }
  function buildTokenClient() {
    if (!gisReady() || !clientId()) return null;
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: clientId(), scope: DRIVE_SCOPE,
      callback: (resp) => {
        if (resp && resp.access_token) { gToken = resp.access_token; gTokenExpiry = Date.now() + ((resp.expires_in || 3600) * 1000); if (gTokenResolve) { gTokenResolve(gToken); gTokenResolve = null; } }
        else if (gTokenResolve) { gTokenResolve(null); gTokenResolve = null; }
      }
    });
    return gTokenClient;
  }
  // Resolve an access token: cached if fresh, else request one (silent unless `interactive`).
  function getToken(interactive) {
    return new Promise((resolve) => {
      if (gToken && Date.now() < gTokenExpiry - 60000) return resolve(gToken);
      if (!gTokenClient && !buildTokenClient()) return resolve(null);
      gTokenResolve = resolve;
      try { gTokenClient.requestAccessToken({ prompt: interactive ? "consent" : "" }); }
      catch (e) { gTokenResolve = null; resolve(null); }
    });
  }
  function setSync(s) { syncStatus = s; updateSyncIndicator(); }

  async function driveFind(token) {
    const q = encodeURIComponent("name='" + SYNC_FILE + "'");
    const r = await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id)&q=" + q, { headers: { Authorization: "Bearer " + token } });
    if (!r.ok) throw new Error("find " + r.status);
    const j = await r.json();
    return (j.files && j.files[0]) ? j.files[0].id : null;
  }
  async function driveGet(token, id) {
    const r = await fetch("https://www.googleapis.com/drive/v3/files/" + id + "?alt=media", { headers: { Authorization: "Bearer " + token } });
    if (!r.ok) throw new Error("get " + r.status);
    return await r.json();
  }
  async function drivePut(token, id, data) {
    const body = JSON.stringify(data);
    if (id) {
      const r = await fetch("https://www.googleapis.com/upload/drive/v3/files/" + id + "?uploadType=media", { method: "PATCH", headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" }, body });
      if (!r.ok) throw new Error("put " + r.status);
      return id;
    }
    const meta = { name: SYNC_FILE, parents: ["appDataFolder"] };
    const bnd = "flowsyncboundary";
    const multipart = "--" + bnd + "\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n" + JSON.stringify(meta) + "\r\n--" + bnd + "\r\nContent-Type: application/json\r\n\r\n" + body + "\r\n--" + bnd + "--";
    const r = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id", { method: "POST", headers: { Authorization: "Bearer " + token, "Content-Type": "multipart/related; boundary=" + bnd }, body: multipart });
    if (!r.ok) throw new Error("create " + r.status);
    return (await r.json()).id;
  }

  // The state we sync — strips device-local fields (sign-in flags, the OAuth client id).
  function exportState() { const s = Object.assign({}, state); delete s.google; delete s.googleClientId; return s; }
  function localIsEmpty() {
    return (state.pools || []).length === 0 && (state.goals || []).length === 0 && (state.history || []).length === 0 && (state.todayExpenses || []).length === 0 && (!state.investment || state.investment.balance <= 1e-9);
  }
  // Replace local state with the remote document, preserving this device's sign-in info.
  function adoptRemote(remote) {
    const g = state.google, cid = state.googleClientId;
    state = remote;
    state.google = g || { signedIn: true, fileId: null };
    if (cid) state.googleClientId = cid;
    migrate(); rollIfNeeded();
  }

  async function signIn() {
    if (!clientId()) { refreshSettings(); return; }
    setSync("syncing");
    const token = await getToken(true);                 // interactive consent
    if (!token) { setSync("offline"); refreshSettings(); return; }
    if (!state.google) state.google = {};
    state.google.signedIn = true;
    try {
      let id = await driveFind(token);
      state.google.fileId = id;
      if (!id) {                                          // first time ever: upload local state
        state.google.fileId = await drivePut(token, null, exportState());
      } else {
        const remote = await driveGet(token, id);
        // new device (empty local) or remote is newer -> take remote; else push local
        if (localIsEmpty() || (remote.updatedAt || 0) > (state.updatedAt || 0)) adoptRemote(remote);
        else await drivePut(token, id, exportState());
      }
      saveLocalOnly(); setSync("synced"); render(); refreshSettings();
    } catch (e) { gToken = null; saveLocalOnly(); setSync("pending"); scheduleRetry(); refreshSettings(); }
  }
  // Keep local state intact; just stop syncing. Never deletes the Drive file.
  function signOut() {
    if (state.google) state.google.signedIn = false;
    gToken = null; gTokenExpiry = 0;
    saveLocalOnly(); setSync("idle"); refreshSettings();
  }
  async function doUpload() {
    if (!signedIn()) return;
    const token = await getToken(false);
    if (!token) { setSync("offline"); scheduleRetry(); return; }
    try {
      let id = state.google.fileId || await driveFind(token);
      id = await drivePut(token, id, exportState());
      state.google.fileId = id; saveLocalOnly(); setSync("synced");
    } catch (e) { gToken = null; setSync("pending"); scheduleRetry(); }
  }
  // Debounced background upload, hooked from save().
  function queueUpload() {
    if (!signedIn()) return;
    setSync("pending");
    if (uploadTimer) clearTimeout(uploadTimer);
    uploadTimer = setTimeout(doUpload, 1500);
  }
  function scheduleRetry() {
    if (retryTimer) return;
    retryTimer = setTimeout(() => { retryTimer = null; if (signedIn() && syncStatus !== "synced") doUpload(); }, 15000);
  }
  // On load / regained connectivity: pull remote if newer, otherwise push local.
  async function resumeSync() {
    if (!signedIn()) return;
    setSync("syncing");
    const token = await getToken(false);
    if (!token) { setSync("offline"); scheduleRetry(); return; }
    try {
      const id = state.google.fileId || await driveFind(token);
      state.google.fileId = id;
      if (id) {
        const remote = await driveGet(token, id);
        if (remote && (remote.updatedAt || 0) > (state.updatedAt || 0)) { adoptRemote(remote); saveLocalOnly(); render(); setSync("synced"); refreshSettings(); return; }
      }
      await doUpload();
    } catch (e) { gToken = null; setSync("pending"); scheduleRetry(); }
  }

  function gLogo() { return '<svg viewBox="0 0 48 48" width="18" height="18" style="flex:none"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>'; }
  function syncPill() {
    const map = { idle: ["Not connected", "var(--faint)"], syncing: ["Syncing…", "var(--invest-2)"], synced: ["Synced", "var(--accent-2)"], pending: ["Sync pending", "var(--goal-2)"], offline: ["Offline — will retry", "var(--faint)"] };
    const m = map[syncStatus] || map.idle;
    return '<span style="color:' + m[1] + '">●</span> <b style="font-weight:700;color:' + m[1] + '">' + m[0] + '</b>';
  }
  function updateSyncIndicator() { const el = document.getElementById("sync-ind"); if (el) el.innerHTML = syncPill(); }
  // Inner content of the Settings "Google Drive sync" card (rebuilt in place on state changes).
  function gsyncCardHTML() {
    if (!clientId()) {
      return `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">To enable Drive sync, paste a Google OAuth <b>Client ID</b> (Web) authorised for this site.</div>
        <input class="input" id="g-clientid" placeholder="…apps.googleusercontent.com" />
        <button class="btn ghost" data-action="g-save-clientid" style="margin-top:10px">Save Client ID</button>
        <div style="font-size:12px;color:var(--muted);margin-top:8px">Create one in Google Cloud Console → APIs &amp; Services → Credentials.</div>`;
    }
    return `<div style="font-size:13px;color:var(--muted);margin-bottom:10px">Privately syncs your budget to a hidden app-data folder in your Google Drive.</div>
      <div id="sync-ind" style="font-size:13.5px;margin-bottom:12px">${syncPill()}</div>
      ${signedIn()
        ? `<button class="btn ghost" data-action="g-signout">Sign out of Google</button>`
        : `<button class="btn gbtn" data-action="g-signin">${gLogo()} Sign in with Google</button>`}
      <details style="margin-top:12px"><summary style="font-size:12.5px;color:var(--muted)">Change OAuth Client ID</summary>
        <input class="input" id="g-clientid" style="margin-top:8px" value="${esc(clientId())}" placeholder="…apps.googleusercontent.com" />
        <button class="btn ghost" data-action="g-save-clientid" style="margin-top:8px">Save Client ID</button>
      </details>`;
  }
  function refreshSettings() { const el = document.getElementById("gsync-card"); if (el) el.innerHTML = gsyncCardHTML(); }

  // ============================================================ BOOT
  function boot() {
    if (!state || !state.investment) {
      document.getElementById("setup").classList.add("show");
      renderSetupChips();
      return;
    }
    migrate();
    rollIfNeeded();
    save();
    render();
    refreshRates(false);   // fetch/refresh exchange rates on open (async; re-renders on success)
    whenGisReady(() => { buildTokenClient(); if (signedIn()) resumeSync(); });   // resume Drive sync
  }

  // process missed midnights while the app stays open / regains focus
  function tick() {
    if (!state) return;
    const before = state.currentDate;
    rollIfNeeded();
    if (state.currentDate !== before) { save(); render(); }
    if (signedIn() && (syncStatus === "pending" || syncStatus === "offline")) doUpload();   // flush queued sync
  }
  setInterval(tick, 30000);
  document.addEventListener("visibilitychange", () => { if (!document.hidden) tick(); });
  window.addEventListener("focus", tick);
  window.addEventListener("online", () => { if (signedIn() && syncStatus !== "synced") doUpload(); });

  boot();

  // ---- PWA: register the offline service worker (no-op if unsupported / file://) ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
</body>
</html>
